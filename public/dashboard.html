<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>
  <div id="loader" style="display:none;">
    <div class="spinner"></div>
  </div>

  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <div class="logo-text">TaskFlow</div>
    </div>
    <div class="user-area">
      <div id="avatar" class="avatar">JD</div>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Dashboard card -->
    <div class="glass dash-card">
      <div class="dash-top">
        <div>
          <div id="dash-greeting" class="dash-greeting">Good morning, John 👋</div>
          <div class="dash-sub">You have <span id="remaining-text">0 tasks</span> remaining today</div>
        </div>
        <div class="dash-date" id="today-date"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat highlight">
          <div class="stat-num" id="s-done">0</div>
          <div class="stat-lbl">Done</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-left">0</div>
          <div class="stat-lbl">Left</div>
        </div>
      </div>
    </div>

    <!-- Create task card -->
    <div class="glass create-card">
      <div class="card-label">Create Task</div>
      <div class="input-row">
        <input
          class="task-input"
          id="title"
          placeholder="Add a new task..."
          maxlength="80"
          onkeydown="if(event.key==='Enter') createTask()"
        />
        <button class="btn-add" onclick="createTask()">
          <span class="plus">+</span> Add
        </button>
      </div>
    </div>

    <!-- Your tasks card -->
    <div class="glass tasks-card">
      <div class="tasks-header">
        <div class="card-label" style="margin:0">Your Tasks</div>
        <button class="btn-refresh" onclick="getTasks()">
          <span id="spin-icon">↻</span> Refresh
        </button>
      </div>
      <div class="task-list" id="task-list"></div>
      <div class="empty-state" id="empty-msg" style="display:none">
        <div class="empty-icon">📋</div>
        No tasks yet — add one above!
      </div>
    </div>

  </div><!-- /main -->

  <!-- ── Edit Modal ───────────────────────────────────── -->
  <div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
    <div class="modal-box">
      <div class="modal-title">✏️ Edit Task</div>
      <input
        class="modal-input"
        id="edit-title-input"
        type="text"
        maxlength="80"
        placeholder="Task title…"
        onkeydown="if(event.key==='Enter') saveEdit()"
      />
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save"   onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script src="task.js">
   
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
