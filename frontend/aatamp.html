<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>
     <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
 
  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <div class="logo-text">TaskFlow</div>
    </div>
    <div class="user-area">
      <div class="avatar">JD</div>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </div>
 
  <!-- Main content -->
  <div class="main">
 
    <!-- Dashboard card -->
    <div class="glass dash-card">
      <div class="dash-top">
        <div>
          <div class="dash-greeting">Good morning, John 👋</div>
          <div class="dash-sub">You have <span id="remaining-text">1 task</span> remaining today</div>
        </div>
        <div class="dash-date" id="today-date"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat highlight">
          <div class="stat-num" id="s-done">0</div>
          <div class="stat-lbl">Done</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-left">0</div>
          <div class="stat-lbl">Left</div>
        </div>
      </div>
    </div>
 
    <!-- Create task card -->
    <div class="glass create-card">
      <div class="card-label">Create Task</div>
      <div class="input-row">
        <input
          class="task-input"
          id="title"
          placeholder="Add a new task..."
          maxlength="80"
        />
        <button class="btn-add" onclick="createTask()">
          <span class="plus">+</span> Add
        </button>
      </div>
    </div>
 
    <!-- Your tasks card -->
    <div class="glass tasks-card">
      <div class="tasks-header">
        <div class="card-label" style="margin:0">Your Tasks</div>
        <button class="btn-refresh" onclick="getTasks()">
          <span id="spin-icon">↻</span> Refresh
        </button>
      </div>
      <div class="task-list" id="task-list"></div>
      <div class="empty-state" id="empty-msg" style="display:none">
        <div class="empty-icon">📋</div>
        No tasks yet — add one above!
      </div>
    </div>

    <script src="tamp.js"></script>
  </div>

  <script>
    const BASE_URL = "http://127.0.0.1:8000/api";

window.onload = getTasks();

//add Task To database
async function createTask() {
    let title = document.getElementById("title").value;

    let res = await fetch(BASE_URL+'/task',{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+localStorage.getItem("token")
        },
        body:JSON.stringify({title})
    });

    let data = await res.json();
    alert(data.message);

    getTasks();
}

async function getTasks() {
    if(localStorage.getItem("token") == null){
        window.location.href = "index.html";
    }

    let res = await fetch(BASE_URL+'/task',{
        method:"GET",
        headers:{   
            "Authorization":"Bearer "+localStorage.getItem("token")
        }
    });

    let data = await res.json();

    //select
    const list   = document.getElementById('task-list');
      const empty  = document.getElementById('empty-msg');
      const done   = data.task.filter(t => t.done).length;
      const left   = data.task.length - done;
 
      document.getElementById('s-total').textContent = data.task.length;
      document.getElementById('s-done').textContent  = done;
      document.getElementById('s-left').textContent  = left;
      document.getElementById('remaining-text').textContent =
        left === 1 ? '1 task' : left + ' tasks';
 
      list.innerHTML = '';
 
      if (!data.task.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
 
      data.task.forEach(task => {
        const div = document.createElement('div');

        if(task.status == "panding"){
          div.className = 'task-item';
          console.log(task.status);
        }
        else{
          div.className = 'task-item' + ' done';
          console.log(task.status);
        }
 
        div.innerHTML = `
          <div class="check-btn" onclick="completeTask(${task.id})">✓</div>
          <span class="task-text">${task.title}</span>
         
          <button class="del-btn" onclick="deleteTask(${task.id})" title="Delete task">✕</button>
        `;
        list.appendChild(div);
      });
    //select

}

async function deleteTask(id){
  let res = await fetch(BASE_URL+'/task/'+id,{
        method:"DELETE",
        headers:{   
            "Authorization":"Bearer "+localStorage.getItem("token")
        }
    });

    let data = await res.json();
    alert(data.message);

    getTasks();
}

async function completeTask(id){
  let res = await fetch(BASE_URL+'/task/'+id,{
        method:"POST",
        headers:{   
            "Authorization":"Bearer "+localStorage.getItem("token")
        }
    });

    // let data = await res.json();
    // alert(data.message);

    getTasks();
}

function logout(){
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
  </script>
</body>
</html>
