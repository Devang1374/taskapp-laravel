<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask</title>
    <link rel="stylesheet" href="task.css">

    <!-- Edit Modal Styles -->
    <style>
      /* ── Edit Modal ─────────────────────────────────── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open { display: flex; }

      .modal-box {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.22);
        backdrop-filter: blur(20px);
        border-radius: 18px;
        padding: 28px 28px 24px;
        width: min(420px, 90vw);
        box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
      }
      @keyframes popIn {
        from { transform: scale(.88); opacity:0; }
        to   { transform: scale(1);   opacity:1; }
      }

      .modal-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 16px;
        letter-spacing: .03em;
      }

      .modal-input {
        width: 100%;
        box-sizing: border-box;
        padding: 11px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.08);
        color: #fff;
        font-size: .95rem;
        outline: none;
        transition: border-color .2s;
      }
      .modal-input:focus { border-color: rgba(255,255,255,0.55); }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
        justify-content: flex-end;
      }

      .btn-cancel {
        padding: 9px 20px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: transparent;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        font-size: .9rem;
        transition: background .2s;
      }
      .btn-cancel:hover { background: rgba(255,255,255,0.08); }

      .btn-save {
        padding: 9px 22px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg,#6ee7b7,#3b82f6);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        font-size: .9rem;
        transition: opacity .2s, transform .15s;
      }
      .btn-save:hover { opacity:.88; transform: translateY(-1px); }

      /* ── Edit button on each task row ───────────────── */
      .edit-btn {
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.75);
        border-radius: 7px;
        padding: 4px 10px;
        cursor: pointer;
        font-size: .78rem;
        transition: background .2s, color .2s;
        margin-right: 6px;
        flex-shrink: 0;
      }
      .edit-btn:hover {
        background: rgba(99,179,237,0.25);
        color: #fff;
      }
    </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <div class="logo-text">TaskFlow</div>
    </div>
    <div class="user-area">
      <div id="avatar" class="avatar">JD</div>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Dashboard card -->
    <div class="glass dash-card">
      <div class="dash-top">
        <div>
          <div class="dash-greeting">Good morning, John 👋</div>
          <div class="dash-sub">You have <span id="remaining-text">0 tasks</span> remaining today</div>
        </div>
        <div class="dash-date" id="today-date"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat highlight">
          <div class="stat-num" id="s-done">0</div>
          <div class="stat-lbl">Done</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-left">0</div>
          <div class="stat-lbl">Left</div>
        </div>
      </div>
    </div>

    <!-- Create task card -->
    <div class="glass create-card">
      <div class="card-label">Create Task</div>
      <div class="input-row">
        <input
          class="task-input"
          id="title"
          placeholder="Add a new task..."
          maxlength="80"
          onkeydown="if(event.key==='Enter') createTask()"
        />
        <button class="btn-add" onclick="createTask()">
          <span class="plus">+</span> Add
        </button>
      </div>
    </div>

    <!-- Your tasks card -->
    <div class="glass tasks-card">
      <div class="tasks-header">
        <div class="card-label" style="margin:0">Your Tasks</div>
        <button class="btn-refresh" onclick="getTasks()">
          <span id="spin-icon">↻</span> Refresh
        </button>
      </div>
      <div class="task-list" id="task-list"></div>
      <div class="empty-state" id="empty-msg" style="display:none">
        <div class="empty-icon">📋</div>
        No tasks yet — add one above!
      </div>
    </div>

  </div><!-- /main -->

  <!-- ── Edit Modal ───────────────────────────────────── -->
  <div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
    <div class="modal-box">
      <div class="modal-title">✏️ Edit Task</div>
      <input
        class="modal-input"
        id="edit-title-input"
        type="text"
        maxlength="80"
        placeholder="Task title…"
        onkeydown="if(event.key==='Enter') saveEdit()"
      />
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save"   onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "http://127.0.0.1:8000/api";

    let editingTaskId = null;

    /* shared header helpers */
    const AUTH      = () => ({ "Authorization": "Bearer " + localStorage.getItem("token") });
    const AUTH_JSON = () => ({ ...AUTH(), "Content-Type": "application/json" });

    /* set today's date */
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

    window.onload = () => {
      getUserProfile();
      getTasks();
    };

    /* ═══════════════════════════════════════════
       USER PROFILE — GET /api/task/user
    ═══════════════════════════════════════════ */
    async function getUserProfile() {
      try {
        const res = await fetch(BASE_URL + '/task/user', {
          method: "GET",
          headers: AUTH()
        });
        const data = await res.json();
        
        // Assuming the API returns the name in data.name (adjust if it's e.g. data.user.name)
        const fullName = data.user; 
        const nameParts = fullName.trim().split(" ");
        
        let initials = "U";
        

        if (nameParts.length >= 2) {
          // First letter of first name + First letter of last name
          initials = nameParts[0][0].toUpperCase() + nameParts[nameParts.length - 1][0].toUpperCase();
        } else if (nameParts.length === 1 && nameParts[0] !== "") {
          // Just first letter of the name
          initials = nameParts[0][0].toUpperCase();
        }

        // Update the avatar div
        document.getElementById('avatar').innerText = initials;
      } catch (err) {
        console.error("Failed to fetch user profile:", err);
      }
    }

    /* ═══════════════════════════════════════════
       CREATE — POST /api/task  { title }
    ═══════════════════════════════════════════ */
    async function createTask() {
      const titleEl = document.getElementById("title");
      const title   = titleEl.value.trim();
      if (!title) return;

      try {
        const res  = await fetch(BASE_URL + '/task', {
          method:  "POST",
          headers: AUTH_JSON(),
          body:    JSON.stringify({ title })
        });
        const data = await res.json();
        alert(data.message);
        titleEl.value = '';
        getTasks();
      } catch (err) {
        alert("Failed to create task.");
        console.error(err);
      }
    }

    /* ═══════════════════════════════════════════
       READ — GET /api/task
    ═══════════════════════════════════════════ */
    async function getTasks() {
      if (!localStorage.getItem("token")) {
        window.location.href = "index.html";
        return;
      }

      const spinIcon = document.getElementById('spin-icon');
      spinIcon.style.animation = 'spin 0.6s linear infinite';

      try {
        const res  = await fetch(BASE_URL + '/task', {
          method:  "GET",
          headers: AUTH()
        });
        const data = await res.json();
        renderTasks(data.task);
      } catch (err) {
        console.error("Failed to fetch tasks:", err);
      } finally {
        spinIcon.style.animation = '';
      }
    }

    function renderTasks(tasks) {
      const list  = document.getElementById('task-list');
      const empty = document.getElementById('empty-msg');

      /* status returned by API: "Complete" or "panding" */
      const doneCount = tasks.filter(t => t.status === "Complete").length;
      const leftCount = tasks.length - doneCount;

      document.getElementById('s-total').textContent = tasks.length;
      document.getElementById('s-done').textContent  = doneCount;
      document.getElementById('s-left').textContent  = leftCount;
      document.getElementById('remaining-text').textContent =
        leftCount === 1 ? '1 task' : leftCount + ' tasks';

      list.innerHTML = '';

      if (!tasks.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      tasks.forEach(task => {
        const isDone = task.status === "Complete";
        const div    = document.createElement('div');
        div.className = 'task-item' + (isDone ? ' done' : '');

        div.innerHTML = `
          <div class="check-btn" onclick="completeTask(${task.id})" title="Mark complete">✓</div>
          <span class="task-text">${escapeHTML(task.title)}</span>
          <button class="edit-btn" onclick="openEditModal(${task.id}, '${escapeAttr(task.title)}')" title="Edit task">✏️ Edit</button>
          <button class="del-btn"  onclick="deleteTask(${task.id})" title="Delete task">✕</button>
        `;
        list.appendChild(div);
      });
    }

    /* ═══════════════════════════════════════════
       COMPLETE — POST /api/task/:id
    ═══════════════════════════════════════════ */
    async function completeTask(id) {
      try {
        await fetch(BASE_URL + '/task/' + id, {
          method:  "POST",
          headers: AUTH()
        });
        getTasks();
      } catch (err) {
        console.error("Failed to mark task complete:", err);
      }
    }

    /* ═══════════════════════════════════════════
       EDIT MODAL
    ═══════════════════════════════════════════ */
    function openEditModal(id, currentTitle) {
      editingTaskId = id;
      document.getElementById('edit-title-input').value = currentTitle;
      document.getElementById('edit-modal').classList.add('open');
      setTimeout(() => document.getElementById('edit-title-input').focus(), 50);
    }

    function closeEditModal(event) {
      if (event && event.target !== document.getElementById('edit-modal')) return;
      document.getElementById('edit-modal').classList.remove('open');
      editingTaskId = null;
    }

    /* UPDATE — PUT /api/task/:id  { title } */
    async function saveEdit() {
      const newTitle = document.getElementById('edit-title-input').value.trim();
      if (!newTitle) { alert("Title cannot be empty."); return; }

      try {
        const res  = await fetch(BASE_URL + '/task/' + editingTaskId, {
          method:  "PUT",
          headers: AUTH_JSON(),
          body:    JSON.stringify({ title: newTitle })
        });
        const data = await res.json();
        alert(data.message);
        document.getElementById('edit-modal').classList.remove('open');
        editingTaskId = null;
        getTasks();
      } catch (err) {
        alert("Failed to update task.");
        console.error(err);
      }
    }

    /* ═══════════════════════════════════════════
       DELETE — DELETE /api/task/:id
    ═══════════════════════════════════════════ */
    async function deleteTask(id) {
      if (!confirm("Delete this task?")) return;

      try {
        const res  = await fetch(BASE_URL + '/task/' + id, {
          method:  "DELETE",
          headers: AUTH()
        });
        const data = await res.json();
        alert(data.message);
        getTasks();
      } catch (err) {
        alert("Failed to delete task.");
        console.error(err);
      }
    }

    /* ═══════════════════════════════════════════
       LOGOUT
    ═══════════════════════════════════════════ */
    function logout() {
      localStorage.removeItem("token");
      window.location.href = "index.html";
    }

    /* ═══════════════════════════════════════════
       HELPERS – prevent XSS
    ═══════════════════════════════════════════ */
    function escapeHTML(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>

  <!-- Spin keyframe (in case task.css doesn't define it) -->
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
